name = "knowledge-mcp"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put`):
# KNOWLEDGE_DATABASE_URL - Neon `knowledge` БД connection string (WP-268 Phase 2 target)
#   Example: postgres://...@ep-dark-hall-ag8bo8lf-pooler.../knowledge?sslmode=require
# HEALTH_DATABASE_URL - Neon `health` БД (DB #8) для observability writes
#   (graph_usage_events). WP-268 Phase 2 cleanup. Если не задан — fallback на
#   activeDsn (т.е. legacy `platform.health.*` через DATABASE_URL). После DROP
#   `platform.health.*` сделать обязательным.
#   Example: postgres://...@ep-dark-hall-ag8bo8lf-pooler.../health?sslmode=require
# DATABASE_URL - DEPRECATED legacy `neondb` connection string (WP-268 Phase 2: keep
#   during soak window, then remove after `neondb` drop). knowledge-mcp falls back
#   to DATABASE_URL only if KNOWLEDGE_DATABASE_URL is unset.
# OPENAI_API_KEY - OpenAI API key
# ORY_URL - Ory Hydra base URL, e.g. https://auth.system-school.ru/hydra
