name = "knowledge-mcp"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# WP-268: schema parameterization (config, не secret).
# Реальная схема в prod = "public" (WP-7 Ф-L2-PRIVACY 2026-05-07).
[vars]
KNOWLEDGE_DB_SCHEMA = "public"

# WP-339 Ф5: Daily heartbeat cron — drift check + targeted reindex at 00:30 UTC
[triggers]
crons = ["30 0 * * *"]

# Secrets (set via `wrangler secret put`):
# KNOWLEDGE_DATABASE_URL - Neon `knowledge` БД connection string. REQUIRED.
#   Example: postgres://...@ep-dark-hall-ag8bo8lf-pooler.../knowledge?sslmode=require
# HEALTH_DATABASE_URL - Neon `health` БД (DB #8) для observability writes
#   (graph_usage_events, internal_metrics). REQUIRED.
#   Example: postgres://...@ep-dark-hall-ag8bo8lf-pooler.../health?sslmode=require
# OPENAI_API_KEY - OpenAI API key
# ORY_URL - Ory Hydra base URL, e.g. https://auth.system-school.ru/hydra
# REINDEX_SECRET - Shared secret for /reindex endpoint
#
# After deploy: `wrangler secret delete DATABASE_URL` (legacy, no longer used).
