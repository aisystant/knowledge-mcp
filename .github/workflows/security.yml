name: Security (B5.2 SAST + B5.3 Audit)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  npm-audit:
    name: npm audit (B5.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --ignore-scripts
      - name: npm audit (high+critical)
        run: npm audit --audit-level=high

  semgrep:
    name: Semgrep SAST (B5.2)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config=p/typescript --config=p/secrets --error src/
